<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE composition>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:pt="jakarta.faces.passthrough"
                template="./WEB-INF/layout/library-layout.xhtml">

    <ui:define name="title">Create card | Library Cards</ui:define>

    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="mb-0">Create library card</h3>
                    <h:link outcome="index" value="Back to list" styleClass="btn btn-outline-secondary btn-sm"/>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h:form id="cardForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="cardno" value="Card No" styleClass="form-label"/>
                                    <h:inputText id="cardno"
                                                 value="#{libraryManaged.card.cardno}"
                                                 styleClass="form-control"
                                                 maxlength="30"
                                                 required="true"
                                                 requiredMessage="Card No is required."/>
                                    <h:message for="cardno" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="studentNo" value="Student" styleClass="form-label"/>
                                    <h:selectOneMenu id="studentNo"
                                                     value="#{libraryManaged.studentNo}"
                                                     styleClass="form-select"
                                                     required="true"
                                                     requiredMessage="Student is required.">
                                        <f:selectItem itemLabel="Select student" itemValue=""/>
                                        <f:selectItems value="#{libraryManaged.students}"
                                                       var="student"
                                                       itemValue="#{student.stdno}"
                                                       itemLabel="#{student.stdno} - #{student.name}"/>
                                    </h:selectOneMenu>
                                    <h:message for="studentNo" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="issueDate" value="Issue Date" styleClass="form-label"/>
                                    <h:inputText id="issueDate"
                                                 value="#{libraryManaged.card.issueDate}"
                                                 styleClass="form-control"
                                                 pt:type="date"
                                                 required="true"
                                                 requiredMessage="Issue Date is required.">
                                        <f:convertDateTime pattern="yyyy-MM-dd"/>
                                    </h:inputText>
                                    <h:message for="issueDate" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="expiryDate" value="Expiry Date" styleClass="form-label"/>
                                    <h:inputText id="expiryDate"
                                                 value="#{libraryManaged.card.expiryDate}"
                                                 styleClass="form-control"
                                                 pt:type="date"
                                                 required="true"
                                                 requiredMessage="Expiry Date is required.">
                                        <f:convertDateTime pattern="yyyy-MM-dd"/>
                                    </h:inputText>
                                    <h:message for="expiryDate" styleClass="text-danger small d-block mt-1"/>
                                </div>
                            </div>

                            <div class="text-end">
                                <h:link outcome="index" value="Cancel" styleClass="btn btn-secondary me-2"/>
                                <h:commandButton value="Save"
                                                 action="#{libraryManaged.addLibCard}"
                                                 styleClass="btn btn-primary"/>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
